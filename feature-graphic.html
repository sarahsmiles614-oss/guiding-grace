<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1024px; height: 500px; overflow: hidden; }
  .wrap {
    width: 1024px;
    height: 500px;
    background-image: url('https://pkfaahfiqcedqblrcoqd.supabase.co/storage/v1/object/public/images/hoai-thu-pt-nv4FFbP8IuE-unsplash.jpg');
    background-size: cover;
    background-position: center;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.52);
  }
  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    color: white;
    font-family: Georgia, serif;
    padding: 40px;
  }
  .eyebrow {
    font-family: Arial, sans-serif;
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    margin-bottom: 18px;
  }
  h1 {
    font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
    font-size: 64px;
    font-weight: bold;
    line-height: 1.1;
    text-shadow: 0 4px 24px rgba(0,0,0,0.8);
    margin-bottom: 20px;
  }
  .sub {
    font-family: Arial, sans-serif;
    font-size: 18px;
    color: rgba(255,255,255,0.8);
    line-height: 1.5;
    max-width: 620px;
    margin: 0 auto 28px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.7);
  }
  .badge {
    display: inline-block;
    font-family: Arial, sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: white;
    border: 1.5px solid rgba(255,255,255,0.4);
    border-radius: 100px;
    padding: 8px 22px;
    letter-spacing: 0.05em;
    background: rgba(255,255,255,0.1);
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="overlay"></div>
    <div class="content">
      <p class="eyebrow">Your Daily Faith Companion</p>
      <h1>Guiding Grace</h1>
      <p class="sub">Daily devotions, prayer wall, Bible in 365 days &amp; a community of believers</p>
      <span class="badge">✨ Free Trial — No Card Required</span>
    </div>
  </div>
</body>
</html>
